<svg viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Gear Teeth -->
  <g fill="#139a43">
    <!-- Tooth 0 deg (top) -->
    <rect x="226" y="11" width="60" height="200" rx="8" />
    <!-- Tooth 45 deg -->
    <rect x="226" y="11" width="60" height="200" rx="8" transform="rotate(45, 256, 256)" />
    <!-- Tooth 90 deg -->
    <rect x="226" y="11" width="60" height="200" rx="8" transform="rotate(90, 256, 256)" />
    <!-- Tooth 135 deg -->
    <rect x="226" y="11" width="60" height="200" rx="8" transform="rotate(135, 256, 256)" />
    <!-- Tooth 180 deg -->
    <rect x="226" y="11" width="60" height="200" rx="8" transform="rotate(180, 256, 256)" />
    <!-- Tooth 225 deg -->
    <rect x="226" y="11" width="60" height="200" rx="8" transform="rotate(225, 256, 256)" />
    <!-- Tooth 270 deg -->
    <rect x="226" y="11" width="60" height="200" rx="8" transform="rotate(270, 256, 256)" />
    <!-- Tooth 315 deg -->
    <rect x="226" y="11" width="60" height="200" rx="8" transform="rotate(315, 256, 256)" />
  </g>
  
  <!-- Green Outer Ring -->
  <circle cx="256" cy="256" r="190" stroke="#139a43" stroke-width="40" fill="none" />

  <!-- Blue Water Wheel Rings -->
  <circle cx="256" cy="256" r="145" stroke="#0073bc" stroke-width="14" fill="none" />
  <circle cx="256" cy="256" r="95" stroke="#0073bc" stroke-width="14" fill="none" />

  <!-- Blue Cross Spokes -->
  <line x1="256" y1="104" x2="256" y2="408" stroke="#0073bc" stroke-width="14" />
  <line x1="104" y1="256" x2="408" y2="256" stroke="#0073bc" stroke-width="14" />

  <!-- Center Yellow Ring with White Fill -->
  <circle cx="256" cy="256" r="50" fill="#ffffff" stroke="#fcd116" stroke-width="16" />
</svg>